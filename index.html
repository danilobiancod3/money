<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Controle Financeiro 3</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }
    input, button {
      margin: 5px;
      padding: 8px;
    }
    #registros {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Controle Financeiro</h1>

  <label>Descrição:
    <input type="text" id="descricao" />
  </label>
  <label>Valor:
    <input type="number" id="valor" />
  </label>
  <button onclick="enviarDados()">Adicionar</button>

  <h2>Registros</h2>
  <div id="registros">Carregando...</div>

  <script>
    // ✅ URL correta do seu Web App
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzpc1o0Y4srXC5eVjG43oOSPbTzIVW1D7yTWv-uWNckPwoLJQGUWrnOb7d4hfGwg7sf2Q/exec';

    // Carrega os registros da planilha e exibe na tela
    async function carregarDados() {
      try {
        const resposta = await fetch(scriptURL + '?action=listar');
        const dados = await resposta.json();
        const div = document.getElementById('registros');
        div.innerHTML = '';

        dados.forEach((linha, index) => {
          div.innerHTML += `<p>${index + 1}. ${linha.descricao} - R$ ${linha.valor} <small>(${linha.data})</small></p>`;
        });
      } catch (erro) {
        console.error('Erro ao carregar dados:', erro);
      }
    }

    // Envia novos dados para a planilha via Apps Script
    async function enviarDados() {
      const descricao = encodeURIComponent(document.getElementById('descricao').value);
      const valor = encodeURIComponent(document.getElementById('valor').value);

      try {
        await fetch(`${scriptURL}?action=adicionar&descricao=${descricao}&valor=${valor}`);
        document.getElementById('descricao').value = '';
        document.getElementById('valor').value = '';
        carregarDados();
      } catch (erro) {
        console.error('Erro ao enviar dados:', erro);
      }
    }

    // Carrega os dados ao abrir a página
    carregarDados();
  </script>
</body>
</html>
